name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check index.js

  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd /root/w1871486_Advanced_Server_Side_CWK

            git pull origin main

            npm ci --omit=dev

            # Patch .env so BASE_URL and CORS_ORIGIN point to the public IP
            sed -i 's|^BASE_URL=.*|BASE_URL=http://${{ secrets.DROPLET_HOST }}:5000|' .env
            sed -i 's|^CORS_ORIGIN=.*|CORS_ORIGIN=http://${{ secrets.DROPLET_HOST }}:5000|' .env
            sed -i 's|^NODE_ENV=.*|NODE_ENV=production|' .env

            pm2 restart alumni-api || pm2 start index.js --name alumni-api

            pm2 save

            echo "Deployment complete"
